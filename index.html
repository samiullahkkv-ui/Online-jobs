<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK PRO | Premium Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9654539721896304" crossorigin="anonymous"></script>

    <style>
        :root { --primary: #00e5ff; --bg: #0a0a0c; --card-bg: #16161a; --text: #ffffff; --border: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        
        header { 
            padding: 20px; text-align: center; font-size: 22px; font-weight: 800; 
            color: var(--primary); border-bottom: 1px solid var(--border); cursor: pointer; 
            background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px);
        }

        .nav-scroll { display: flex; justify-content: center; gap: 10px; padding: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-scroll button { padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: #222; color: #aaa; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .nav-scroll button.active { background: var(--primary); color: #000; border-color: var(--primary); font-weight: 600; }

        #posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #222; display: block; }
        .card-content { padding: 15px; flex-grow: 1; }
        .badge { font-size: 10px; color: var(--primary); background: rgba(0,229,255,0.1); padding: 4px 8px; border-radius: 4px; margin-bottom: 10px; display: inline-block; font-weight: 700; }
        .card h3 { font-size: 17px; margin-bottom: 15px; color: #fff; }
        .btn-action { display: block; background: var(--primary); padding: 12px; border-radius: 8px; color: #000; text-decoration: none; text-align: center; font-weight: 700; transition: 0.3s; }

        .ad-row { grid-column: 1 / -1; width: 100%; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.02); border-radius: 10px; min-height: 100px; }

        /* Admin UI */
        #loginBox { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; background: #1a1a1e; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); width: 90%; max-width: 320px; }
        #adminPanel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: var(--bg); overflow-y: auto; padding: 20px; }
        .admin-container { max-width: 600px; margin: auto; background: var(--card-bg); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .btn-save { background: var(--primary); color: #000; border: none; font-weight: 800; padding: 16px; border-radius: 10px; cursor: pointer; width: 100%; }
        
        @media (max-width: 600px) { #posts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header id="secretTrigger">APK PRO PORTAL</header>

<div class="nav-scroll">
    <button class="active" onclick="filterCat('All', this)">All Items</button>
    <button onclick="filterCat('APK Pro', this)">Apps</button>
    <button onclick="filterCat('Online Job', this)">Jobs</button>
    <button onclick="filterCat('Social', this)">Accounts</button>
</div>

<div id="posts"></div>

<div id="loginBox">
    <h3 style="text-align:center; margin-bottom:20px;">Admin PIN</h3>
    <input type="password" id="adminPass" placeholder="Enter PIN">
    <button onclick="checkAdmin()" class="btn-save">Enter</button>
</div>

<div id="adminPanel">
    <div class="admin-container">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <h2>Dashboard</h2>
            <button onclick="closeAdmin()" style="background:#444; color:#fff; border:none; padding:8px 15px; border-radius:8px;">Exit</button>
        </div>
        <input id="title" placeholder="Post Title">
        <select id="category">
            <option value="APK Pro">APK Pro</option>
            <option value="Online Job">Online Job</option>
            <option value="Social">Social Account</option>
        </select>
        <input id="image" placeholder="Direct Image URL (ends in .jpg/.png)">
        <input id="link" placeholder="Target Link">
        <button onclick="savePost()" id="saveBtn" class="btn-save">PUBLISH NOW</button>
        <div id="manageList" style="margin-top:20px;"></div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB1xDTe_eNQCdRv8IQThV5uZdqWi9kGS8A",
    authDomain: "jibs-707f7.firebaseapp.com",
    projectId: "jibs-707f7",
    storageBucket: "jibs-707f7.firebasestorage.app",
    messagingSenderId: "137786498737",
    appId: "1:137786498737:web:238403fe3123ac30150c90"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allPosts = [];
let currentCategory = "All";

onSnapshot(query(collection(db, "posts"), orderBy("created", "desc")), (snap) => {
    allPosts = snap.docs.map(d => ({...d.data(), id: d.id}));
    renderPosts();
    renderAdminList();
});

function renderPosts() {
    const container = document.getElementById("posts");
    container.innerHTML = "";
    
    const filtered = allPosts.filter(p => currentCategory === "All" || p.category === currentCategory);
    
    filtered.forEach((p) => {
        // Post Card with Image Error Handling
        const cardHtml = `
        <div class="card">
            <img src="${p.image}" 
                 onerror="this.onerror=null; this.src='https://via.placeholder.com/400x225?text=Image+URL+Error';">
            <div class="card-content">
                <span class="badge">${p.category}</span>
                <h3>${p.title}</h3>
                <a href="${p.link}" target="_blank" class="btn-action">OPEN</a>
            </div>
        </div>`;
        
        // Ad Unit
        const adHtml = `
        <div class="ad-row">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-9654539721896304"
                 data-ad-slot="2571500310"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
        </div>`;

        container.innerHTML += cardHtml + adHtml;
        try { (adsbygoogle = window.adsbygoogle || []).push({}); } catch(e) {}
    });
}

window.filterCat = (cat, btn) => {
    currentCategory = cat;
    document.querySelectorAll(".nav-scroll button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    renderPosts();
};

window.savePost = async () => {
    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;
    const image = document.getElementById("image").value;
    const link = document.getElementById("link").value;
    if(!title || !image || !link) return alert("All fields required");

    try {
        await addDoc(collection(db, "posts"), { title, category, image, link, created: Date.now() });
        alert("Success!");
        document.getElementById("title").value = "";
        document.getElementById("image").value = "";
        document.getElementById("link").value = "";
    } catch (e) { alert("Error saving post"); }
};

window.deletePost = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "posts", id)); };

let clicks = 0;
document.getElementById("secretTrigger").onclick = () => {
    clicks++;
    if(clicks >= 5) { document.getElementById("loginBox").style.display = "block"; clicks = 0; }
    setTimeout(() => clicks = 0, 3000);
};

window.checkAdmin = () => {
    if(document.getElementById("adminPass").value === "sami21") {
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("loginBox").style.display = "none";
    } else alert("Wrong PIN");
};

window.closeAdmin = () => document.getElementById("adminPanel").style.display = "none";

function renderAdminList() {
    document.getElementById("manageList").innerHTML = allPosts.map(p => `
        <div style="display:flex; justify-content:space-between; padding:10px; background:#222; margin-bottom:5px; border-radius:5px;">
            <span style="font-size:12px;">${p.title}</span>
            <button onclick="deletePost('${p.id}')" style="color:red; background:none; border:none; cursor:pointer;">Del</button>
        </div>
    `).join('');
}
</script>
</body>
</html>
