<!DOCTYPE html>
<html lang="en">
<head><meta name="google-site-verification" content="o48Yg61o58_VGhHDoHJ0ZBi8kWA6moyX8N-HXhAsm-4" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK PRO | Premium Portal</title>
    
    <script type='text/javascript' src='https://pl28839208.effectivegatecpm.com/38/f7/b9/38f7b926b986f6c1723c477850498d6e.js'></script>
    <script src="https://pl28858949.effectivegatecpm.com/7d/97/0e/7d970e2a03dd099466726126e933483b.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { 
            --primary: #00e5ff; 
            --primary-dark: #007bff;
            --bg: #0a0a0b; 
            --glass: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.1); 
            --gradient: linear-gradient(135deg, #00e5ff, #007bff);
            --card-bg: #121214;
            --text: #ffffff;
            --sub-text: #a0a0a0;
        }

        [data-theme="light"] {
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #121212;
            --border: rgba(0, 0, 0, 0.08);
            --glass: rgba(0, 0, 0, 0.03);
            --sub-text: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        header { 
            position: sticky; 
            top: 0; 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            background: rgba(var(--bg), 0.8); 
            border-bottom: 1px solid var(--border); 
            padding: 15px 5%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000; 
        }

        .logo { font-weight: 800; font-size: 22px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; cursor: pointer; }

        .theme-toggle {
            background: var(--glass);
            border: 1px solid var(--border);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: 12px;
            cursor: pointer;
            display: grid; place-items: center;
        }

        /* Top Banner Ad Styling */
        .ad-container-top { 
            width: 100%; max-width: 728px; margin: 20px auto; min-height: 90px; 
            background: var(--glass); border-radius: 16px; border: 1px solid var(--border); 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        .nav-container { 
            position: sticky; top: 72px; background: var(--bg); padding: 15px 0; z-index: 999; border-bottom: 1px solid var(--border);
        }

        .nav-scroll { display: flex; gap: 10px; padding: 0 5%; overflow-x: auto; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        
        .nav-scroll button { 
            padding: 10px 20px; border-radius: 12px; border: 1px solid var(--border); 
            background: var(--glass); color: var(--sub-text); font-weight: 600; 
            cursor: pointer; white-space: nowrap; transition: 0.2s; font-size: 14px;
        }

        .nav-scroll button.active { 
            background: var(--gradient); color: white; border-color: transparent; box-shadow: 0 8px 20px rgba(0, 229, 255, 0.2);
        }

        #posts { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 25px; padding: 30px 5%; max-width: 1300px; margin: auto; 
        }

        .card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; 
            overflow: hidden; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }

        .card-img-wrapper { height: 210px; position: relative; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        .views-badge { 
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.6); 
            padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 700; color: #fff; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-content { padding: 20px; }
        .card-content .cat-tag { font-size: 11px; color: var(--primary); font-weight: 800; text-transform: uppercase; margin-bottom: 8px; display: block; }
        .card-content h3 { font-size: 19px; margin-bottom: 12px; font-weight: 700; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .card-footer { 
            display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; 
            border-top: 1px solid var(--border);
        }
        
        .footer-btn { background: var(--glass); border: 1px solid var(--border); color: var(--text); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .footer-btn.liked { color: #ff4757; background: rgba(255, 71, 87, 0.1); border-color: #ff4757; }

        .btn-action { 
            display: block; width: calc(100% - 40px); margin: 0 20px 20px 20px; 
            padding: 16px; border-radius: 16px; border: none; font-weight: 800; 
            cursor: pointer; background: var(--gradient); color: white; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Admin UI */
        #loginBox, #adminPanel { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }
        #loginBox { top: 50%; left: 50%; transform: translate(-50%, -50%); height: fit-content; width: 90%; max-width: 400px; border: 1px solid var(--border); border-radius: 30px; background: var(--card-bg); }
        .admin-container { max-width: 500px; margin: 40px auto; background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1px solid var(--border); }
        
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); }
        
        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; background: var(--gradient); color: white; cursor: pointer; }
        .close-admin { position: absolute; top: 25px; right: 25px; font-size: 28px; color: #fff; cursor: pointer; }

        @media (max-width: 600px) {
            #posts { grid-template-columns: 1fr; }
            .logo { font-size: 18px; }
        }
    </style>
</head>
<body data-theme="dark">

<header>
    <div class="logo" id="secretTrigger">APK PRO PORTAL</div>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">
        <i class="fa-solid fa-moon"></i>
    </button>
</header>

<div class="ad-container-top">
    <script type="text/javascript">
        atOptions = { 'key' : '02181dfedb7a4ce1a863473b5b40abdd', 'format' : 'iframe', 'height' : 90, 'width' : 728, 'params' : {} };
    </script>
    <script type="text/javascript" src="https://www.highperformanceformat.com/02181dfedb7a4ce1a863473b5b40abdd/invoke.js"></script>
</div>

<nav class="nav-container">
    <div class="nav-scroll">
        <button id="cat-All" class="active" onclick="filterCat('All', this)">All Items</button>
        <button id="cat-APK Pro" onclick="filterCat('APK Pro', this)">Premium Apps</button>
        <button id="cat-Online Job" onclick="filterCat('Online Job', this)">Online Jobs</button>
        <button id="cat-Social" onclick="filterCat('Social', this)">Accounts</button>
    </div>
</nav>

<main id="posts"></main>

<div id="loginBox">
    <div style="padding: 20px;">
        <h3 style="margin-bottom:20px; text-align:center;">Admin Security</h3>
        <input type="password" id="adminPass" placeholder="Enter PIN">
        <button onclick="checkAdmin()" class="btn-save">LOGIN</button>
        <p onclick="toggleLogin(false)" style="text-align:center; margin-top:15px; font-size:13px; color:var(--sub-text); cursor:pointer;">Close</p>
    </div>
</div>

<div id="adminPanel">
    <span class="close-admin" onclick="closeAdmin()">&times;</span>
    <div class="admin-container">
        <h2 style="margin-bottom:20px;">Manage Portal</h2>
        <input id="title" placeholder="Post Title">
        <select id="category">
            <option value="APK Pro">APK Pro</option>
            <option value="Online Job">Online Job</option>
            <option value="Social">Social</option>
        </select>
        <input id="image" placeholder="Image URL">
        <input id="link" placeholder="Download URL (Smart Link)">
        <button onclick="savePost()" class="btn-save">PUBLISH POST</button>
        
        <div style="margin-top:25px; border-top: 1px solid var(--border); padding-top:15px;">
            <h4 style="margin-bottom:10px;">Active Posts</h4>
            <div id="manageList" style="max-height: 250px; overflow-y: auto;"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1xDTe_eNQCdRv8IQThV5uZdqWi9kGS8A",
        authDomain: "jibs-707f7.firebaseapp.com",
        projectId: "jibs-707f7",
        storageBucket: "jibs-707f7.firebasestorage.app",
        messagingSenderId: "137786498737",
        appId: "1:137786498737:web:238403fe3123ac30150c90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allPosts = [];
    let currentCategory = "All";

    // Real-time Data Sync
    onSnapshot(query(collection(db, "posts"), orderBy("created", "desc")), (snap) => {
        allPosts = snap.docs.map(d => ({ ...d.data(), id: d.id }));
        renderPosts();
        renderAdminList();
    });

    window.renderPosts = () => {
        const container = document.getElementById("posts");
        container.innerHTML = "";
        const filtered = allPosts.filter(p => currentCategory === "All" || p.category === currentCategory);
        
        filtered.forEach((p) => {
            const downloads = p.downloads || 0;
            container.insertAdjacentHTML('beforeend', `
                <article class="card">
                    <div class="card-img-wrapper">
                        <img src="${p.image}" alt="${p.title}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x250?text=APK+PRO'">
                        <div class="views-badge"><i class="fa-solid fa-cloud-arrow-down"></i> ${downloads}</div>
                    </div>
                    <div class="card-content">
                        <span class="cat-tag">${p.category}</span>
                        <h3>${p.title}</h3>
                    </div>
                    <div class="card-footer">
                        <span style="font-size:12px; color:var(--sub-text); font-weight:600;"><i class="fa-solid fa-shield-halved" style="color:var(--primary)"></i> Verified</span>
                        <div style="display:flex; gap:10px;">
                            <button class="footer-btn" onclick="toggleLike(this)"><i class="fa-regular fa-heart"></i></button>
                            <button class="footer-btn" onclick="shareAndCopy('${p.title}')"><i class="fa-solid fa-share-nodes"></i></button>
                        </div>
                    </div>
                    <button onclick="trackDownload('${p.id}', '${p.link}')" class="btn-action">Get File Now</button>
                </article>`);
        });
    }

    // Direct Ad Redirect + Analytics
    window.trackDownload = async (postId, url) => {
        try {
            const postRef = doc(db, "posts", postId);
            await updateDoc(postRef, { downloads: increment(1) });
            // Smart Link logic - Adding your provided key
            const finalLink = "https://www.effectivegatecpm.com/h03kkwv4b7?key=8a514977f02194dc4ed0de00c3a24d2c";
            window.open(finalLink, '_blank'); // Direct to Smart link for revenue
            setTimeout(() => { window.location.href = url; }, 1000); // Redirect to original link after pop
        } catch (e) {
            window.open(url, '_blank');
        }
    };

    window.savePost = async () => {
        const title = document.getElementById("title").value;
        const category = document.getElementById("category").value;
        const image = document.getElementById("image").value;
        const link = document.getElementById("link").value;

        if (!title || !image || !link) return alert("All fields are required!");

        await addDoc(collection(db, "posts"), {
            title, category, image, link, downloads: 0, created: Date.now()
        });
        
        alert("Published Successfully!");
        ["title", "image", "link"].forEach(id => document.getElementById(id).value = "");
    };

    window.deletePost = async (id) => {
        if (confirm("Permanently delete this post?")) {
            await deleteDoc(doc(db, "posts", id));
        }
    };

    window.renderAdminList = () => {
        const list = document.getElementById("manageList");
        list.innerHTML = allPosts.map(p => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;border:1px solid var(--border);margin-bottom:8px;border-radius:12px;background:var(--glass);">
                <span style="font-size:13px; font-weight:600;">${p.title.substring(0,25)}...</span>
                <button onclick="deletePost('${p.id}')" style="color:#ff4757;border:none;background:none;cursor:pointer;font-weight:bold;">DELETE</button>
            </div>`).join('');
    };

    window.filterCat = (cat, btn) => {
        currentCategory = cat;
        document.querySelectorAll(".nav-scroll button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderPosts();
    };

    window.toggleTheme = () => {
        const body = document.body;
        const btn = document.getElementById("themeBtn");
        const current = body.getAttribute("data-theme");
        const next = current === "dark" ? "light" : "dark";
        body.setAttribute("data-theme", next);
        btn.innerHTML = next === "dark" ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-solid fa-sun"></i>';
    };

    window.shareAndCopy = (t) => {
        const text = `Check out ${t} on APK PRO: ${window.location.href}`;
        navigator.clipboard.writeText(text);
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    };

    window.toggleLike = (b) => {
        b.classList.toggle('liked');
        const icon = b.querySelector('i');
        icon.className = b.classList.contains('liked') ? "fa-solid fa-heart" : "fa-regular fa-heart";
    };

    // Secret Admin Access
    let clicks = 0;
    document.getElementById("secretTrigger").onclick = () => {
        clicks++;
        if (clicks >= 5) { toggleLogin(true); clicks = 0; }
        setTimeout(() => clicks = 0, 3000);
    };

    window.toggleLogin = (show) => {
        document.getElementById("loginBox").style.display = show ? "block" : "none";
    };

    window.checkAdmin = () => {
        if (document.getElementById("adminPass").value === "0706176") {
            document.getElementById("adminPanel").style.display = "block";
            toggleLogin(false);
        } else {
            alert("Unauthorized Access");
        }
    };

    window.closeAdmin = () => document.getElementById("adminPanel").style.display = "none";
</script>

</body>
</html>
