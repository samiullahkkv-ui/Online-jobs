<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK PRO | Premium Portal</title>
    
    <script type='text/javascript' src='//pl28839208.effectivegatecpm.com/38/f7/b9/38f7b926b986f6c1723c477850498d6e.js'></script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --primary: #00e5ff; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.08); --gradient: linear-gradient(135deg, #00e5ff, #007bff); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; padding-bottom: 50px; }
        
        header { position: sticky; top: 0; backdrop-filter: blur(20px); background: rgba(5, 5, 5, 0.8); border-bottom: 1px solid var(--border); padding: 18px; text-align: center; font-weight: 800; font-size: 22px; background-image: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 1000; cursor: pointer; }
        
        /* 🔥 BADA BANNER AREA */
        .big-banner-slot { 
            width: 100%; 
            max-width: 728px; 
            margin: 15px auto; 
            min-height: 95px; 
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.02);
            border-radius: 8px;
            overflow: hidden;
        }

        .nav-container { position: sticky; top: 65px; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); padding: 12px 0; z-index: 999; }
        .nav-scroll { display: flex; gap: 10px; padding: 0 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-scroll::-webkit-scrollbar { display: none; }
        .nav-scroll button { padding: 9px 20px; border-radius: 50px; border: 1px solid var(--border); background: var(--glass); color: #aaa; font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 13px; }
        .nav-scroll button.active { background: var(--gradient); color: #000; border: none; }
        
        #posts { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; transition: 0.3s; position: relative; }
        .card-img-wrapper { height: 180px; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Views Image ke uper */
        .views-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.8); padding: 4px 12px; border-radius: 50px; font-size: 11px; font-weight: 800; color: var(--primary); backdrop-filter: blur(5px); border: 1px solid var(--border); }

        .card-content { padding: 15px; flex-grow: 1; }
        .card-footer { display: flex; justify-content: space-between; padding: 12px 15px; border-top: 1px solid var(--border); align-items: center; background: rgba(0,0,0,0.2); }
        
        .footer-btn { background: none; border: none; color: #777; cursor: pointer; font-size: 18px; transition: 0.3s; }
        .footer-btn.liked { color: #ff4444; }

        .btn-action { margin: 15px; padding: 15px; border-radius: 50px; border: none; font-weight: 800; cursor: pointer; background: var(--gradient); color: #000; font-size: 14px; }

        /* ⏳ TIMER OVERLAY */
        #adLoader { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .timer-ring { width: 110px; height: 110px; border: 5px solid #111; border-top: 5px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; color: var(--primary); animation: spin 1s linear infinite; margin-bottom: 25px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #loginBox, #adminPanel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 11000; padding: 20px; }
        #loginBox { top: 50%; left: 50%; transform: translate(-50%, -50%); height: fit-content; width: 90%; max-width: 350px; border: 1px solid var(--primary); border-radius: 20px; padding: 30px; }
        .admin-container { max-width: 600px; margin: 20px auto; background: var(--glass); padding: 25px; border-radius: 24px; border: 1px solid var(--border); }
        input, select { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 50px; font-weight: 800; background: var(--gradient); color: #000; cursor: pointer; }
    </style>
</head>
<body>

<header id="secretTrigger">APK PRO PORTAL</header>

<div class="big-banner-slot">
    <script type="text/javascript">
        atOptions = {
            'key' : '02181dfedb7a4ce1a863473b5b40abdd',
            'format' : 'iframe',
            'height' : 90,
            'width' : 728,
            'params' : {}
        };
    </script>
    <script type="text/javascript" src="https://www.highperformanceformat.com/02181dfedb7a4ce1a863473b5b40abdd/invoke.js"></script>
</div>

<div id="adLoader">
    <div class="timer-ring"><span id="countDown">10</span></div>
    <h2 style="color:var(--primary); letter-spacing:1px;">PREPARING SECURE LINK</h2>
    <p style="color:#666; margin-top:10px;">Checking premium content availability...</p>
</div>

<div class="nav-container">
    <div class="nav-scroll">
        <button class="active" onclick="filterCat('All', this)">All Items</button>
        <button onclick="filterCat('APK Pro', this)">Apps</button>
        <button onclick="filterCat('Online Job', this)">Jobs</button>
        <button onclick="filterCat('Social', this)">Accounts</button>
    </div>
</div>

<div id="posts"></div>

<div id="loginBox">
    <h3 style="margin-bottom:20px; text-align:center;">Admin Portal</h3>
    <input type="password" id="adminPass" placeholder="Enter Secret PIN">
    <button onclick="checkAdmin()" class="btn-save">Access Admin</button>
</div>

<div id="adminPanel">
    <div class="admin-container">
        <button onclick="closeAdmin()" style="color:var(--primary); background:none; border:none; margin-bottom:20px; cursor:pointer; font-weight:bold;">← BACK</button>
        <input id="title" placeholder="Title">
        <select id="category">
            <option value="APK Pro">APK Pro</option>
            <option value="Online Job">Online Job</option>
            <option value="Social">Social</option>
        </select>
        <input id="image" placeholder="Image URL">
        <input id="link" placeholder="Download Link">
        <button onclick="savePost()" class="btn-save">POST NOW</button>
        <div id="manageList" style="margin-top:20px; max-height: 250px; overflow-y: auto;"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1xDTe_eNQCdRv8IQThV5uZdqWi9kGS8A",
        authDomain: "jibs-707f7.firebaseapp.com",
        projectId: "jibs-707f7",
        storageBucket: "jibs-707f7.firebasestorage.app",
        messagingSenderId: "137786498737",
        appId: "1:137786498737:web:238403fe3123ac30150c90"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allPosts = [];
    let currentCategory = "All";

    onSnapshot(query(collection(db, "posts"), orderBy("created", "desc")), (snap) => {
        allPosts = snap.docs.map(d => ({ ...d.data(), id: d.id }));
        renderPosts();
        renderAdminList();
    });

    window.openWithAds = (url) => {
        let timeLeft = 10;
        const loader = document.getElementById("adLoader");
        const countDisplay = document.getElementById("countDown");
        loader.style.display = "flex";
        
        const timer = setInterval(() => {
            timeLeft--;
            countDisplay.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                loader.style.display = "none";
                window.open(url, '_blank');
            }
        }, 1000);
    };

    window.shareAndCopy = (title) => {
        const text = `🔥 *${title}* \nDownload now from APK PRO! \n👉 ${window.location.href}`;
        navigator.clipboard.writeText(text);
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    };

    window.toggleLike = (btn) => {
        btn.classList.toggle('liked');
        const icon = btn.querySelector('i');
        icon.className = btn.classList.contains('liked') ? "fa-solid fa-heart" : "fa-regular fa-heart";
    };

    function renderPosts() {
        const container = document.getElementById("posts");
        container.innerHTML = "";
        const filtered = allPosts.filter(p => currentCategory === "All" || p.category === currentCategory);
        
        filtered.forEach((p) => {
            container.insertAdjacentHTML('beforeend', `
                <div class="card">
                    <div class="card-img-wrapper">
                        <img src="${p.image}" alt="${p.title}" loading="lazy">
                        <div class="views-badge"><i class="fa-solid fa-eye"></i> 1.4M</div>
                    </div>
                    <div class="card-content">
                        <span style="font-size:10px;color:var(--primary);font-weight:800;text-transform:uppercase;">${p.category}</span>
                        <h3 style="margin:8px 0; font-size:16px;">${p.title}</h3>
                    </div>
                    <div class="card-footer">
                        <div style="font-size:11px; font-weight:700; color:#888;"><i class="fa-solid fa-heart" style="color:#ff4444;"></i> 500k Likes</div>
                        <div style="display:flex; gap:18px;">
                            <button class="footer-btn" onclick="toggleLike(this)"><i class="fa-regular fa-heart"></i></button>
                            <button class="footer-btn" onclick="shareAndCopy('${p.title}')"><i class="fa-brands fa-whatsapp"></i></button>
                        </div>
                    </div>
                    <button onclick="openWithAds('${p.link}')" class="btn-action">OPEN NOW</button>
                </div>`);
        });
    }

    function renderAdminList() {
        document.getElementById("manageList").innerHTML = allPosts.map(p => `
            <div style="display:flex;justify-content:space-between;padding:10px;background:rgba(0,0,0,0.3);margin-bottom:5px;border-radius:8px;">
                <span style="font-size:11px;">${p.title}</span>
                <button onclick="deletePost('${p.id}')" style="color:#ff4444;background:none;border:none;cursor:pointer;">DEL</button>
            </div>`).join('');
    }

    window.filterCat = (cat, btn) => {
        currentCategory = cat;
        document.querySelectorAll(".nav-scroll button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderPosts();
    };

    window.savePost = async () => {
        const title = document.getElementById("title").value;
        const category = document.getElementById("category").value;
        const image = document.getElementById("image").value;
        const link = document.getElementById("link").value;
        if (title && image && link) {
            await addDoc(collection(db, "posts"), { title, category, image, link, created: Date.now() });
            alert("Success!");
            document.getElementById("title").value = "";
            document.getElementById("image").value = "";
            document.getElementById("link").value = "";
        }
    };

    window.deletePost = async (id) => { if (confirm("Delete this post?")) await deleteDoc(doc(db, "posts", id)); };

    let clicks = 0;
    document.getElementById("secretTrigger").onclick = () => {
        clicks++;
        if (clicks >= 5) { document.getElementById("loginBox").style.display = "block"; clicks = 0; }
        setTimeout(() => clicks = 0, 3000);
    };

    window.checkAdmin = () => {
        if (document.getElementById("adminPass").value === "0706176") {
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("loginBox").style.display = "none";
        }
    };
    window.closeAdmin = () => document.getElementById("adminPanel").style.display = "none";
</script>

</body>
</html>
