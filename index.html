<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Jobs & Earnings</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eaeff1; margin: 0; padding: 0; }
        .header { background-color: #0056b3; color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header h1 { margin: 0; font-size: 24px; }
        
        .filters { text-align: center; margin: 20px 0; }
        .filter-btn { background: white; border: 2px solid #0056b3; color: #0056b3; padding: 8px 15px; margin: 5px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .filter-btn:hover, .filter-btn.active { background: #0056b3; color: white; }
        
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 15px; max-width: 1200px; margin: auto; }
        
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .badge { position: absolute; top: 10px; left: 10px; color: white; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        
        .card-content { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { margin: 0 0 10px 0; font-size: 18px; color: #333; }
        .card-desc { color: #555; font-size: 14px; margin-bottom: 15px; flex-grow: 1; }
        
        .ad-box { text-align: center; margin: 10px 0; background: #f8f9fa; border: 1px dashed #ccc; padding: 5px; min-height: 90px; }
        
        .apply-btn { text-align: center; background-color: #0056b3; color: white; text-decoration: none; padding: 10px; border-radius: 5px; font-weight: bold; display: block; margin-top: 10px; }
        .apply-btn:hover { background-color: #004494; }
        
        .no-data { text-align: center; grid-column: 1 / -1; color: #777; padding: 30px; }
    </style>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9654539721896304" crossorigin="anonymous"></script>
</head>
<body>

<div class="header">
    <h1>Daily Jobs & Earning Updates</h1>
</div>

<div class="ad-box" style="max-width: 1200px; margin: 15px auto;">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-9654539721896304" data-ad-slot="1716089384" data-ad-format="auto" data-full-width-responsive="true"></ins>
</div>

<div class="filters">
    <button class="filter-btn active" onclick="filterData('All', this)">All</button>
    <button class="filter-btn" onclick="filterData('Job', this)">Jobs</button>
    <button class="filter-btn" onclick="filterData('Earning App', this)">Apps</button>
    <button class="filter-btn" onclick="filterData('Earning Website', this)">Websites</button>
</div>

<div class="container" id="post-container">
    </div>

<script>
window.onload = function() {
    loadUserPosts('All');
};

function loadUserPosts(categoryFilter) {
    let posts = JSON.parse(localStorage.getItem("jobs")) || [];
    let container = document.getElementById("post-container");
    container.innerHTML = ""; 

    let filteredPosts = posts;
    if (categoryFilter !== 'All') {
        filteredPosts = posts.filter(post => post.category === categoryFilter);
    }

    if (filteredPosts.length === 0) {
        container.innerHTML = `<div class="no-data">Data available nahi hai. Admin se post daalein.</div>`;
        return;
    }

    filteredPosts.forEach((post, index) => {
        let badgeColor = post.category === "Job" ? "#28a745" : (post.category === "Earning App" ? "#dc3545" : "#007bff");

        // Har doosre post ke baad card ke andar ad show karega (Safe limit for AdSense)
        let adHtml = "";
        if (index % 2 !== 0) {
            adHtml = `
            <div class="ad-box">
                <ins class="adsbygoogle" style="display:block" data-ad-format="fluid" data-ad-layout-key="-gw-1+2a-9x+5c" data-ad-client="ca-pub-9654539721896304" data-ad-slot="1716089384"></ins>
            </div>`;
        }

        container.innerHTML += `
        <div class="card">
            <span class="badge" style="background-color: ${badgeColor};">${post.category}</span>
            <img src="${post.image}" alt="Image">
            <div class="card-content">
                <h3 class="card-title">${post.title}</h3>
                <p class="card-desc">${post.desc}</p>
                ${adHtml}
                <a href="${post.url}" class="apply-btn" target="_blank">Apply / View Info</a>
            </div>
        </div>`;
    });

    // Pushing AdSense tags properly after rendering HTML
    let adElements = container.getElementsByClassName("adsbygoogle");
    for (let i = 0; i < adElements.length; i++) {
        try {
            (adsbygoogle = window.adsbygoogle || []).push({});
        } catch (e) {
            console.log("AdSense Error:", e);
        }
    }
}

function filterData(category, btnElement) {
    let buttons = document.querySelectorAll('.filter-btn');
    buttons.forEach(btn => btn.classList.remove('active'));
    btnElement.classList.add('active');
    loadUserPosts(category);
}
</script>

</body>
</html>
